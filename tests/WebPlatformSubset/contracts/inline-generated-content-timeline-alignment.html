<!doctype html>
<meta charset="utf-8">
<title>Inline child generated separators and centered timeline indicators</title>
<style>
  body { margin: 0; font: 16px/25px sans-serif; }
  .status-item { display: inline; }
  .status-text > .status-item:not(:last-child)::after { content: " "; }
  .status-reference { position: absolute; visibility: hidden; }
  .timeline { display: flex; align-items: center; gap: 8px; height: 32px; width: 360px; }
  .timeline-day { line-height: 16px; }
  .timeline-track { position: relative; flex: 1 1 auto; height: 8px; }
  .timeline-marker {
    position: absolute;
    left: 70%;
    top: 50%;
    width: 2px;
    height: 26px;
    transform: translate(-50%, -50%);
  }
  .baseline-timeline { display: flex; align-items: baseline; width: 360px; }
  .baseline-day { box-sizing: content-box; font: 10px/12px sans-serif; padding-top: 3px; width: 30px; }
  .baseline-track { flex: 1 1 auto; height: 7px; }
</style>
<p id="status-text" class="status-text"><span id="status-first" class="status-item">All's well — market is open.</span><span id="status-second" class="status-item"><b>It'll close in 3 hours.</b></span></p>
<span id="status-reference" class="status-item status-reference">All's well — market is open.</span>
<div id="timeline" class="timeline"><span id="timeline-day" class="timeline-day">WED</span><span id="timeline-track" class="timeline-track"><i id="timeline-marker" class="timeline-marker"></i></span></div>
<div id="baseline-timeline" class="baseline-timeline"><span id="baseline-day" class="baseline-day">WED</span><span id="baseline-track" class="baseline-track"></span></div>
<script>
  const state = window.__htmlMlWptState = {
    complete: false, harness: null, results: [], errors: [], diagnostics: []
  };
  const result = { name: "generated separator and timeline cross-axis geometry are preserved" };
  try {
    const rect = id => document.getElementById(id).getBoundingClientRect();
    const statusFirst = rect("status-first");
    const statusSecond = rect("status-second");
    const statusReference = rect("status-reference");
    const timeline = rect("timeline");
    const timelineDay = rect("timeline-day");
    const timelineTrack = rect("timeline-track");
    const timelineMarker = rect("timeline-marker");
    const baselineTimeline = rect("baseline-timeline");
    const baselineDay = rect("baseline-day");
    const baselineTrack = rect("baseline-track");
    const failures = [];
    const close = (actual, expected, label, tolerance = .6) => {
      if (Math.abs(actual - expected) > tolerance) {
        failures.push(label + ": expected " + expected + ", got " + actual);
      }
    };
    if (statusFirst.width - statusReference.width < 2) {
      failures.push("child ::after separator space did not contribute inline width");
    }
    close(statusSecond.left, statusFirst.right,
      "adjacent generated-content status fragments");
    close(timelineDay.top + timelineDay.height / 2,
      timelineTrack.top + timelineTrack.height / 2,
      "timeline day label cross-axis center");
    close(timelineMarker.top + timelineMarker.height / 2,
      timelineTrack.top + timelineTrack.height / 2,
      "translated current-time marker center");
    if (getComputedStyle(document.getElementById("baseline-timeline")).alignItems !== "baseline") {
      failures.push("align-items: baseline was not preserved in computed style");
    }
    close(baselineTimeline.height, 15, "baseline timeline height", .1);
    close(baselineDay.top, baselineTimeline.top, "baseline day top", .1);
    close(baselineTrack.top, baselineTimeline.top + 6,
      "non-text timeline track baseline placement", .6);
    if (failures.length) throw new Error(failures.join("; "));
    result.status = "PASS";
    result.message = null;
    result.stack = null;
    state.diagnostics = [JSON.stringify({ statusFirst, statusSecond, statusReference,
      timeline, timelineDay, timelineTrack, timelineMarker,
      baselineTimeline, baselineDay, baselineTrack })];
    state.harness = { status: 0, message: null, stack: null };
  } catch (error) {
    result.status = "FAIL";
    result.message = String(error && error.message || error);
    result.stack = error && error.stack ? String(error.stack) : null;
    state.harness = { status: 1, message: result.message, stack: result.stack };
  }
  state.results.push(result);
  state.complete = true;
</script>
