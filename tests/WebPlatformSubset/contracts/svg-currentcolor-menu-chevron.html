<!doctype html>
<meta charset="utf-8">
<title>Nested menu SVGs resolve inherited currentColor through author fill and stroke rules</title>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .menu-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 120px;
    height: 40px;
    padding: 0 10px;
    color: rgb(157, 171, 174);
    background: rgb(11, 24, 26);
  }

  svg {
    display: block;
    width: 24px;
    height: 24px;
  }

  .css-fill path {
    fill: currentColor;
  }

  .css-stroke path {
    fill: none;
    stroke: currentColor;
  }

</style>
<div class="menu-row">
  <svg class="fill-chevron" viewBox="0 0 24 24" aria-hidden="true">
    <path fill="currentColor" d="M7 4l9 8-9 8z"></path>
  </svg>
  <svg class="stroke-chevron" viewBox="0 0 24 24" aria-hidden="true">
    <path fill="none" stroke="currentColor" stroke-width="2" d="M7 4l9 8-9 8"></path>
  </svg>
  <svg class="css-fill" viewBox="0 0 24 24" aria-hidden="true">
    <path fill="#000000" d="M7 4l9 8-9 8z"></path>
  </svg>
  <svg class="css-stroke" viewBox="0 0 24 24" aria-hidden="true">
    <path fill="#000000" stroke="#000000" stroke-width="2" d="M7 4l9 8-9 8"></path>
  </svg>
</div>
