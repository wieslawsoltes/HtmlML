<!doctype html>
<meta charset="utf-8">
<title>Reference for observed CSS transform and grid gap aliases</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; background: white; }
  .transform-stage { position: relative; width: 100px; height: 30px; background: rgb(255, 0, 0); }
  .translated {
    position: absolute;
    left: 30px;
    width: 20px;
    height: 20px;
    background: rgb(0, 160, 0);
  }
  .grid {
    display: grid;
    grid-template-columns: 20px 20px;
    gap: 10px;
    width: 50px;
    height: 20px;
    background: rgb(255, 0, 0);
  }
  .grid > div { width: 20px; height: 20px; background: rgb(0, 0, 192); }
</style>
<div class="transform-stage"><div class="translated"></div></div>
<div class="grid"><div></div><div></div></div>
