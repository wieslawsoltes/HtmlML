<!doctype html>
<meta charset="utf-8">
<title>Window EventTarget listener lifecycle</title>
<body>
<script>
  const state = window.__htmlMlWptState = {
    complete: false, harness: null, results: [], errors: [], diagnostics: []
  };
  function assert(condition, message) { if (!condition) throw new Error(message); }
  function test(name, body) {
    try {
      body();
      state.results.push({ name, status: "PASS", message: null, stack: null });
    } catch (error) {
      state.results.push({ name, status: "FAIL", message: String(error.message || error), stack: error.stack || null });
    }
  }

  test("window exposes the EventTarget listener surface", () => {
    assert(typeof window.addEventListener === "function", "window.addEventListener is missing");
    assert(typeof window.removeEventListener === "function", "window.removeEventListener is missing");
    assert(typeof window.dispatchEvent === "function", "window.dispatchEvent is missing");
  });

  test("removed window listeners receive no later event", () => {
    let count = 0;
    const listener = () => count++;
    window.addEventListener("htmlml-window-probe", listener);
    window.dispatchEvent(new Event("htmlml-window-probe"));
    window.removeEventListener("htmlml-window-probe", listener);
    window.dispatchEvent(new Event("htmlml-window-probe"));
    assert(count === 1, `listener count was ${count}`);
  });

  const failure = state.results.find(result => result.status !== "PASS");
  state.harness = failure
    ? { status: 1, message: failure.message, stack: failure.stack }
    : { status: 0, message: null, stack: null };
  state.complete = true;
</script>
