<!doctype html>
<meta charset="utf-8">
<title>Opacity composites an element and its descendants as a group</title>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: white;
  }

  .group {
    position: relative;
    width: 140px;
    height: 90px;
    background: rgb(255, 0, 0);
    opacity: 0.5;
  }

  .child {
    position: absolute;
    top: 20px;
    left: 30px;
    width: 80px;
    height: 50px;
    background: rgb(0, 0, 255);
  }
</style>
<div class="group"><div class="child"></div></div>
