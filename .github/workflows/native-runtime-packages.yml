name: NuGet packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified repository version to NuGet.org
        required: true
        default: false
        type: boolean
  push:
    tags:
    - 'v*'

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.version.outputs.package-version }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - id: version
      name: Resolve and validate package version
      shell: bash
      env:
        REQUESTED_PUBLISH: ${{ inputs.publish }}
      run: |
        version="$(
          dotnet msbuild src/HtmlML.Core/HtmlML.Core.csproj \
            -getProperty:PackageVersion -nologo |
            tail -n 1 | tr -d '\r'
        )"
        publish="${REQUESTED_PUBLISH:-false}"
        if [[ "$GITHUB_REF_TYPE" == tag ]]; then
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$version" ]]; then
            echo "Tag version '$tag_version' does not match repository PackageVersion '$version'." >&2
            exit 1
          fi
          publish=true
        fi
        if [[ -z "$version" ]]; then
          echo "Unable to resolve the repository package version." >&2
          exit 1
        fi
        echo "package-version=$version" >> "$GITHUB_OUTPUT"
        echo "publish=$publish" >> "$GITHUB_OUTPUT"

  managed:
    name: Pack managed packages
    needs: metadata
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Pack and verify managed packages
      shell: bash
      run: |
        scripts/pack-managed-packages.sh \
          --package-version '${{ needs.metadata.outputs.package-version }}' \
          --output "$GITHUB_WORKSPACE/artifacts/nuget-packages"
    - name: Upload managed packages
      uses: actions/upload-artifact@v4
      with:
        name: managed-${{ needs.metadata.outputs.package-version }}
        path: |
          artifacts/nuget-packages/*.nupkg
          artifacts/nuget-packages/*.snupkg
          artifacts/nuget-packages/managed-packages.json
        if-no-files-found: error

  native:
    name: Build ${{ matrix.rid }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-latest
          rid: osx-arm64
          cpu: arm64
          monolith: libv8_monolith.a
          script: unix
        - os: ubuntu-latest
          rid: linux-x64
          cpu: x64
          monolith: libv8_monolith.a
          script: unix
        - os: windows-latest
          rid: win-x64
          cpu: x64
          monolith: v8_monolith.lib
          script: windows
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Initialize reviewed V8 patch inputs
      shell: bash
      run: git submodule update --init third-party/clearscript
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - id: v8-cache-key
      name: Resolve pinned V8 SDK cache identity
      shell: bash
      run: |
        echo "image-version=${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"
        echo "clearscript-revision=$(git -C third-party/clearscript rev-parse HEAD)" >> "$GITHUB_OUTPUT"
    - id: v8-cache
      name: Restore pinned V8 SDK
      uses: actions/cache/restore@v4
      with:
        path: |
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/include
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/out/${{ matrix.cpu }}/Release/args.gn
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/out/${{ matrix.cpu }}/Release/obj/${{ matrix.monolith }}
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/out/${{ matrix.cpu }}/Release/icudtl.dat
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/LICENSE
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/third_party/icu/LICENSE
        key: htmlml-v8-sdk-v2-${{ matrix.rid }}-${{ steps.v8-cache-key.outputs.image-version }}-${{ steps.v8-cache-key.outputs.clearscript-revision }}-${{ hashFiles('scripts/build-native-engine-runtime.sh', 'scripts/build-native-engine-runtime.ps1', 'packaging/HtmlML.NativeEngine.Runtime/patches/**', 'third-party/clearscript/V8/*.txt') }}
    - name: Build, pack, and test Unix runtime
      if: matrix.script == 'unix'
      shell: bash
      run: |
        v8_root=
        if [[ '${{ steps.v8-cache.outputs.cache-hit }}' == true ]]; then
          v8_root="$GITHUB_WORKSPACE/artifacts/native-engine-v8/${{ matrix.rid }}/v8"
        fi
        scripts/build-native-engine-runtime.sh \
          --rid '${{ matrix.rid }}' \
          --package-version '${{ needs.metadata.outputs.package-version }}' \
          --v8-root "$v8_root" \
          --output "$GITHUB_WORKSPACE/artifacts/nuget-packages"
    - name: Build, pack, and test Windows runtime
      if: matrix.script == 'windows'
      shell: pwsh
      run: |
        $v8Root = ""
        if ('${{ steps.v8-cache.outputs.cache-hit }}' -eq 'true') {
          $v8Root = "$env:GITHUB_WORKSPACE/artifacts/native-engine-v8/${{ matrix.rid }}/v8"
        }
        ./scripts/build-native-engine-runtime.ps1 `
          -Rid '${{ matrix.rid }}' `
          -PackageVersion '${{ needs.metadata.outputs.package-version }}' `
          -V8Root $v8Root `
          -Output "$env:GITHUB_WORKSPACE/artifacts/nuget-packages"
    - id: v8-sdk-ready
      name: Validate completed V8 SDK for caching
      if: always() && steps.v8-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        root="artifacts/native-engine-v8/${{ matrix.rid }}/v8"
        monolith="$root/out/${{ matrix.cpu }}/Release/obj/${{ matrix.monolith }}"
        if [[ -f "$root/include/v8.h" \
          && -f "$root/out/${{ matrix.cpu }}/Release/args.gn" \
          && -f "$monolith" \
          && -f "$root/out/${{ matrix.cpu }}/Release/icudtl.dat" \
          && -f "$root/LICENSE" \
          && -f "$root/third_party/icu/LICENSE" ]]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Save completed V8 SDK
      if: always() && steps.v8-sdk-ready.outputs.ready == 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/include
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/out/${{ matrix.cpu }}/Release/args.gn
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/out/${{ matrix.cpu }}/Release/obj/${{ matrix.monolith }}
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/out/${{ matrix.cpu }}/Release/icudtl.dat
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/LICENSE
          artifacts/native-engine-v8/${{ matrix.rid }}/v8/third_party/icu/LICENSE
        key: htmlml-v8-sdk-v2-${{ matrix.rid }}-${{ steps.v8-cache-key.outputs.image-version }}-${{ steps.v8-cache-key.outputs.clearscript-revision }}-${{ hashFiles('scripts/build-native-engine-runtime.sh', 'scripts/build-native-engine-runtime.ps1', 'packaging/HtmlML.NativeEngine.Runtime/patches/**', 'third-party/clearscript/V8/*.txt') }}
    - name: Upload verified RID package
      uses: actions/upload-artifact@v4
      with:
        name: native-${{ matrix.rid }}-${{ needs.metadata.outputs.package-version }}
        path: artifacts/nuget-packages/*.nupkg
        if-no-files-found: error

  package-set:
    name: Verify release package set
    needs: [metadata, managed, native]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download managed packages
      uses: actions/download-artifact@v4
      with:
        name: managed-${{ needs.metadata.outputs.package-version }}
        path: artifacts/nuget-packages
    - name: Download native packages
      uses: actions/download-artifact@v4
      with:
        pattern: native-*-${{ needs.metadata.outputs.package-version }}
        path: artifacts/nuget-packages
        merge-multiple: true
    - name: Verify versions, dependencies, symbols, and package inventory
      shell: bash
      run: |
        python3 scripts/verify-release-packages.py \
          artifacts/nuget-packages \
          --version '${{ needs.metadata.outputs.package-version }}' \
          --native-rid osx-arm64 \
          --native-rid linux-x64 \
          --native-rid win-x64 \
          --output artifacts/nuget-packages/release-packages.json
        shasum -a 256 \
          artifacts/nuget-packages/*.nupkg \
          artifacts/nuget-packages/*.snupkg \
          > artifacts/nuget-packages/packages.sha256
    - name: Upload complete verified package set
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ needs.metadata.outputs.package-version }}
        path: |
          artifacts/nuget-packages/*.nupkg
          artifacts/nuget-packages/*.snupkg
          artifacts/nuget-packages/*.json
          artifacts/nuget-packages/packages.sha256
        if-no-files-found: error

  consumer:
    name: Package consumer ${{ matrix.rid }}
    needs: [metadata, package-set]
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-latest
          rid: osx-arm64
        - os: ubuntu-latest
          rid: linux-x64
        - os: windows-latest
          rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Download verified package set
      uses: actions/download-artifact@v4
      with:
        name: release-${{ needs.metadata.outputs.package-version }}
        path: artifacts/nuget-packages
    - name: Restore clean package consumer
      shell: bash
      run: |
        dotnet restore tests/HtmlML.Runtime.PackageSmoke/HtmlML.Runtime.PackageSmoke.csproj \
          -p:RuntimeIdentifier='${{ matrix.rid }}' \
          -p:HtmlMlPackageVersion='${{ needs.metadata.outputs.package-version }}' \
          --configfile tests/HtmlML.Runtime.PackageSmoke/NuGet.config
    - name: Build and run clean package consumer
      shell: bash
      run: |
        dotnet run \
          --project tests/HtmlML.Runtime.PackageSmoke/HtmlML.Runtime.PackageSmoke.csproj \
          -c Release \
          -r '${{ matrix.rid }}' \
          --no-restore \
          -p:HtmlMlPackageVersion='${{ needs.metadata.outputs.package-version }}'

  publish:
    name: Publish to NuGet.org
    needs: [metadata, consumer]
    if: needs.metadata.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: nuget.org
    permissions:
      contents: read
      id-token: write
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
    - uses: actions/checkout@v4
    - name: Download verified package set
      uses: actions/download-artifact@v4
      with:
        name: release-${{ needs.metadata.outputs.package-version }}
        path: artifacts/nuget-packages
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - id: trusted-publishing
      name: Exchange GitHub identity for a temporary NuGet API key
      if: env.NUGET_API_KEY == '' && env.NUGET_USER != ''
      uses: NuGet/login@v1
      with:
        user: ${{ env.NUGET_USER }}
    - name: Publish packages and symbols
      env:
        TRUSTED_PUBLISHING_API_KEY: ${{ steps.trusted-publishing.outputs.NUGET_API_KEY }}
      shell: bash
      run: |
        api_key="${NUGET_API_KEY:-$TRUSTED_PUBLISHING_API_KEY}"
        if [[ -z "$api_key" ]]; then
          echo "Configure either NUGET_API_KEY or NUGET_USER in the nuget.org environment." >&2
          exit 1
        fi
        for package in artifacts/nuget-packages/*.nupkg; do
          dotnet nuget push "$package" \
            --api-key "$api_key" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        done
